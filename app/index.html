<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeerAnalyst Playground</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 16px;
      }
      .row {
        display: flex;
        gap: 16px;
      }
      .col {
        flex: 1;
      }
      pre {
        background: #f4f4f4;
        padding: 8px;
        overflow: auto;
        height: 70vh;
        font-size: 11px;
      }
      button {
        padding: 6px 12px;
        margin-right: 8px;
      }
      input {
        padding: 4px 12px;
        font-size: 14px;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <h1>PeerAnalyst loopback 스모크</h1>
    <div>
      <input
        id="serverUrl"
        placeholder="http://localhost:3000/api/collect"
        value="http://localhost:3000/api/collect"
      />
    </div>
    <p>
      <button id="start">start</button>
      <button id="stop">stop</button>
      <span id="status">idle</span>
    </p>
    <div class="row">
      <div class="col">
        <h2>sender (outbound)</h2>
        <pre id="sender-out"></pre>
      </div>
      <div class="col">
        <h2>receiver (inbound)</h2>
        <pre id="receiver-out"></pre>
      </div>
    </div>
    <script type="module" src="/src/playground.ts"></script>
  </body>
</html>
